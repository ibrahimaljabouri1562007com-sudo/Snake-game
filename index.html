<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modern Snake</title>
<style>
  :root {
    --bg: #0a0d18;
    --hud: #0b0f1c;
    --gridA: #121829;
    --gridB: #151c30;
    --accent: #FF8C1A;       /* orange theme */
    --accent2: #FFB347;
    --text: #F2F5FC;
    --dim: #8A93AB;
    --food: #FF4D6D;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background:
      radial-gradient(900px 500px at 50% -8%, #20283f, transparent),
      radial-gradient(700px 500px at 110% 110%, #2a1c10, transparent),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
    -webkit-user-select: none; user-select: none;
  }
  .shell {
    width: min(92vw, 560px);
    background: linear-gradient(180deg, #0e1322, #0a0e1a);
    border: 1px solid #222a44;
    border-radius: 24px;
    box-shadow:
      0 40px 100px rgba(0,0,0,.6),
      0 0 0 1px rgba(255,140,26,.06),
      inset 0 1px 0 rgba(255,255,255,.05);
    overflow: hidden;
  }
  .hud {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    padding: 16px 22px;
    background: linear-gradient(180deg, #0d1222, #0a0e1a);
    border-bottom: 1px solid #1c2238;
    position: relative;
  }
  .hud::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .8;
  }
  .stat { display: flex; flex-direction: column; align-items: flex-start; }
  .stat.best { align-items: flex-end; }
  .label { font-size: 10px; letter-spacing: .16em; color: var(--dim); font-weight: 700; }
  .val {
    display: inline-block;
    font-size: 28px; font-weight: 800; line-height: 1; margin-top: 3px;
    font-variant-numeric: tabular-nums;
    transition: transform .12s ease;
    transform-origin: left center;
  }
  .val.bump { transform: scale(1.35); }
  .best .val { color: var(--accent2); transform-origin: right center; }
  .title {
    font-size: 17px; font-weight: 800; letter-spacing: .26em; text-align: center;
    background: linear-gradient(180deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .stage { position: relative; }
  canvas { display: block; width: 100%; height: auto; background: var(--bg); }
  .overlay {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center; flex-direction: column;
    background: radial-gradient(circle at 50% 45%, rgba(10,13,24,.55), rgba(8,11,20,.9));
    backdrop-filter: blur(3px);
    text-align: center; padding: 24px;
  }
  .overlay.show { display: flex; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .overlay h1 {
    margin: 0 0 10px; font-size: 40px; letter-spacing: .04em;
    background: linear-gradient(180deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 4px 24px rgba(255,140,26,.35));
  }
  .overlay p { margin: 0; color: var(--dim); font-size: 14px; max-width: 320px; line-height: 1.5; }
  .overlay p b { color: var(--text); }
  .hint {
    padding: 13px 20px; font-size: 12px; color: var(--dim);
    background: linear-gradient(180deg, #0a0e1a, #0c1020);
    border-top: 1px solid #1c2238; text-align: center;
  }
  .hint b { color: var(--accent2); }
</style>
</head>
<body>
  <div class="shell">
    <div class="hud">
      <div class="stat score"><div class="label">SCORE</div><div class="val" id="score">0</div></div>
      <div class="title">SNAKE</div>
      <div class="stat best"><div class="label">BEST</div><div class="val" id="best">0</div></div>
    </div>
    <div class="stage">
      <canvas id="game" width="560" height="560"></canvas>
      <div class="overlay show" id="overlay">
        <h1 id="ovTitle">MODERN SNAKE</h1>
        <p id="ovText">Press <b>Space</b> or any arrow key to start</p>
      </div>
    </div>
    <div class="hint">
      <b>Arrows / WASD</b> move &nbsp;·&nbsp; <b>Space / P</b> pause &nbsp;·&nbsp; <b>Enter / R</b> restart
    </div>
  </div>

<script>
const CFG = {
  COLS: 20, ROWS: 20,
  START_SPEED: 130, MIN_SPEED: 60, SPEED_STEP: 4,
  gridA: "#121829", gridB: "#151c30",
  // snake starts white, turns red once score reaches RED_AT
  RED_AT: 3,
  white: { head: "#FFFFFF", body: "#EDEFF5", bodyDeep: "#C7CCDA", glow: "rgba(255,255,255,0.50)" },
  red:   { head: "#FF6B6B", body: "#FF3B3B", bodyDeep: "#C41E1E", glow: "rgba(255,60,60,0.55)" },
  food: "#FF4D6D", foodGlow: "#FF8FA6",
  eye: "#1a1003",
};
function snakePalette(){ return score >= CFG.RED_AT ? CFG.red : CFG.white; }
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const CELL = canvas.width / CFG.COLS;
const DIRS = { Up:[0,-1], Down:[0,1], Left:[-1,0], Right:[1,0] };
const OPP = { Up:"Down", Down:"Up", Left:"Right", Right:"Left" };
const KEYMAP = {
  ArrowUp:"Up", ArrowDown:"Down", ArrowLeft:"Left", ArrowRight:"Right",
  w:"Up", s:"Down", a:"Left", d:"Right", W:"Up", S:"Down", A:"Left", D:"Right",
};

let snake, dir, queue, food, score, best = 0, speed, state, last = 0;
let particles = [], popups = [], pulse = 0;

function reset() {
  const mx = CFG.COLS>>1, my = CFG.ROWS>>1;
  snake = [[mx,my],[mx-1,my],[mx-2,my]];
  dir = "Right"; queue = [];
  speed = CFG.START_SPEED; score = 0;
  state = "ready";
  particles = []; popups = [];
  spawnFood();
  document.getElementById("score").textContent = 0;
  showOverlay("MODERN SNAKE", "Press <b>Space</b> or any arrow key to start");
}
function key(c){ return c[0]+","+c[1]; }
function spawnFood(){
  const occ = new Set(snake.map(key));
  const free = [];
  for(let x=0;x<CFG.COLS;x++) for(let y=0;y<CFG.ROWS;y++)
    if(!occ.has(x+","+y)) free.push([x,y]);
  food = free.length ? free[Math.floor(Math.random()*free.length)] : null;
}
function showOverlay(t, s){
  const o = document.getElementById("overlay");
  document.getElementById("ovTitle").innerHTML = t;
  document.getElementById("ovText").innerHTML = s;
  o.classList.add("show");
}
function hideOverlay(){ document.getElementById("overlay").classList.remove("show"); }
function bump(id){
  const el = document.getElementById(id);
  el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump");
}

function burst(cx, cy){
  for(let i=0;i<14;i++){
    const a = (Math.PI*2*i)/14 + (i%2)*0.2;
    const sp = 1.4 + (i%4)*0.5;
    particles.push({x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1,
      c: i%3===0 ? CFG.food : (i%3===1 ? CFG.head : CFG.headHi)});
  }
}

function step(){
  if(queue.length) dir = queue.shift();
  const [dx,dy] = DIRS[dir];
  const head = [snake[0][0]+dx, snake[0][1]+dy];
  const [nx,ny] = head;
  if(nx<0||nx>=CFG.COLS||ny<0||ny>=CFG.ROWS) return gameOver(false);
  const eating = food && nx===food[0] && ny===food[1];
  const occ = new Set(snake.slice(0, eating ? snake.length : -1).map(key));
  if(occ.has(key(head))) return gameOver(false);
  snake.unshift(head);
  if(eating){
    score++; best = Math.max(best, score);
    document.getElementById("score").textContent = score;
    document.getElementById("best").textContent = best;
    bump("score"); if(score===best) bump("best");
    const fx = food[0]*CELL+CELL/2, fy = food[1]*CELL+CELL/2;
    burst(fx, fy);
    popups.push({x:fx, y:fy, life:1, text:"+1"});
    speed = Math.max(CFG.MIN_SPEED, speed - CFG.SPEED_STEP);
    spawnFood();
    if(!food) return gameOver(true);
  } else {
    snake.pop();
  }
}
function gameOver(won){
  state = won ? "won" : "over";
  showOverlay(won ? "YOU WIN!" : "GAME OVER",
    (won ? "Perfect run! Score <b>" : "Score <b>") + score + "</b> · Press <b>Enter</b> to play again");
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function draw(ts){
  pulse += 0.05;
  // board
  for(let x=0;x<CFG.COLS;x++) for(let y=0;y<CFG.ROWS;y++){
    ctx.fillStyle = (x+y)%2 ? CFG.gridB : CFG.gridA;
    ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
  }

  // food (pulsing, glowing)
  if(food){
    const cx = food[0]*CELL+CELL/2, cy = food[1]*CELL+CELL/2;
    const p = 1 + Math.sin(pulse)*0.12;
    ctx.save();
    ctx.shadowColor = CFG.food; ctx.shadowBlur = 18;
    ctx.fillStyle = CFG.foodGlow; ctx.beginPath();
    ctx.arc(cx,cy,CELL*0.40*p,0,7); ctx.fill();
    ctx.fillStyle = CFG.food; ctx.beginPath();
    ctx.arc(cx,cy,CELL*0.26*p,0,7); ctx.fill();
    ctx.restore();
  }

  // snake (glowing orange, gradient head->tail)
  ctx.save();
  const pal = snakePalette();
  ctx.shadowColor = pal.glow; ctx.shadowBlur = 14;
  const n = snake.length;
  snake.forEach((c,i)=>{
    const pad = i===0 ? 1 : 2;
    let col;
    if(i===0) col = pal.head;
    else {
      const t = i/Math.max(1,n-1);              // 0..1 head->tail
      col = lerpColor(pal.body, pal.bodyDeep, t);
    }
    ctx.fillStyle = col;
    roundRect(c[0]*CELL+pad, c[1]*CELL+pad, CELL-2*pad, CELL-2*pad, CELL/3);
    ctx.fill();
  });
  ctx.restore();

  // glossy highlight on head
  {
    const [hx,hy] = snake[0];
    ctx.fillStyle = "rgba(255,255,255,0.28)";
    roundRect(hx*CELL+4, hy*CELL+4, CELL*0.4, CELL*0.28, 4);
    ctx.fill();
  }

  // eyes
  const [hx,hy] = snake[0], [dx,dy] = DIRS[dir];
  const cx = hx*CELL+CELL/2, cy = hy*CELL+CELL/2;
  const perp = [-dy,dx], er = Math.max(2, CELL/8);
  for(const s of [1,-1]){
    const ex = cx + dx*CELL*0.16 + perp[0]*CELL*0.22*s;
    const ey = cy + dy*CELL*0.16 + perp[1]*CELL*0.22*s;
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ex,ey,er,0,7); ctx.fill();
    ctx.fillStyle = CFG.eye; ctx.beginPath();
    ctx.arc(ex+dx*er*0.4, ey+dy*er*0.4, er*0.5, 0, 7); ctx.fill();
  }

  // particles
  for(const pt of particles){
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.04; pt.life -= 0.03;
    ctx.globalAlpha = Math.max(0, pt.life);
    ctx.fillStyle = pt.c;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 2.4, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
  particles = particles.filter(p=>p.life>0);

  // floating +1 popups
  ctx.textAlign = "center";
  for(const pu of popups){
    pu.y -= 0.8; pu.life -= 0.02;
    ctx.globalAlpha = Math.max(0, pu.life);
    ctx.fillStyle = CFG.headHi;
    ctx.font = "800 18px 'Segoe UI', sans-serif";
    ctx.fillText(pu.text, pu.x, pu.y);
  }
  ctx.globalAlpha = 1;
  popups = popups.filter(p=>p.life>0);
}

function lerpColor(a, b, t){
  const ca = hexToRgb(a), cb = hexToRgb(b);
  const r = Math.round(ca[0]+(cb[0]-ca[0])*t);
  const g = Math.round(ca[1]+(cb[1]-ca[1])*t);
  const bl = Math.round(ca[2]+(cb[2]-ca[2])*t);
  return `rgb(${r},${g},${bl})`;
}
function hexToRgb(h){
  const n = parseInt(h.slice(1),16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}

function loop(ts){
  if(state==="running"){
    if(ts - last >= speed){ last = ts; step(); }
  }
  draw(ts);
  requestAnimationFrame(loop);
}

function start(){
  if(state==="ready"){ state="running"; last=0; hideOverlay(); }
}
document.addEventListener("keydown", e=>{
  const k = e.key;
  if([" ","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(k)) e.preventDefault();
  if(k==="Escape") return;
  if(state==="over"||state==="won"){ if(k==="Enter"||k==="r"||k==="R") reset(); return; }
  if(k===" "||k==="p"||k==="P"){
    if(state==="running") { state="paused"; showOverlay("PAUSED","Press <b>Space</b> to resume"); }
    else if(state==="paused"){ state="running"; last=0; hideOverlay(); }
    else if(state==="ready") start();
    return;
  }
  const logical = KEYMAP[k];
  if(logical){
    if(state==="ready") start();
    if(state!=="running") return;
    const lastDir = queue.length ? queue[queue.length-1] : dir;
    if(logical!==OPP[lastDir] && logical!==lastDir && queue.length<2) queue.push(logical);
  }
});

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
